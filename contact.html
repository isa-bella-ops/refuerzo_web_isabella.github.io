<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHSECURE Ω | Contacto</title>

    <!-- FUENTES -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --primary:#00e5ff;
            --secondary:#7c3aed;
            --dark:#020617;
            --glass:rgba(255,255,255,0.06);
            --border:rgba(255,255,255,0.1);
            --text:#cbd5e1;
        }

        body{
            font-family:'Inter',sans-serif;
            background:var(--dark);
            color:white;
            overflow-x:hidden;
        }

        /* FONDO */

        body::before{
            content:'';
            position:fixed;
            inset:0;
            background:
                radial-gradient(circle at 20% 20%, rgba(0,229,255,0.12), transparent 30%),
                radial-gradient(circle at 80% 80%, rgba(124,58,237,0.15), transparent 30%);
            z-index:-2;
        }

        /* NAV */

        nav{
            position:fixed;
            top:0;
            width:100%;
            padding:20px 8%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:rgba(2,6,23,0.6);
            backdrop-filter:blur(15px);
            border-bottom:1px solid var(--border);
        }

        .logo{
            font-family:'Orbitron',sans-serif;
            font-size:26px;
            font-weight:800;
            color:var(--primary);
            text-shadow:0 0 15px var(--primary);
        }

        nav ul{
            display:flex;
            gap:25px;
            list-style:none;
        }

        nav ul li a{
            color:white;
            text-decoration:none;
            font-weight:500;
            transition:0.3s;
        }

        nav ul li a:hover{
            color:var(--primary);
        }

        /* HERO */

        .hero{
            min-height:45vh;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            padding:120px 20px 60px;
        }

        .hero h1{
            font-family:'Orbitron',sans-serif;
            font-size:60px;
            background:linear-gradient(90deg,var(--primary),var(--secondary));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .hero p{
            margin-top:15px;
            color:var(--text);
            font-size:18px;
        }

        /* CONTENEDOR */

        .container{
            width:90%;
            max-width:1100px;
            margin:auto;
            padding:60px 0;
        }

        /* GRID */

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:30px;
        }

        /* FORMULARIO */

        .form-box{
            background:var(--glass);
            border:1px solid var(--border);
            backdrop-filter:blur(15px);
            padding:40px;
            border-radius:25px;
        }

        .form-box h2{
            font-family:'Orbitron',sans-serif;
            margin-bottom:20px;
            color:var(--primary);
        }

        input, textarea{
            width:100%;
            padding:14px;
            margin-top:10px;
            margin-bottom:20px;
            border-radius:12px;
            border:1px solid var(--border);
            background:rgba(255,255,255,0.03);
            color:white;
            outline:none;
        }

        textarea{
            min-height:120px;
            resize:none;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            color:white;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.03);
            box-shadow:0 0 25px rgba(0,229,255,0.4);
        }

        /* INFO */

        .info-box{
            background:var(--glass);
            border:1px solid var(--border);
            backdrop-filter:blur(15px);
            padding:40px;
            border-radius:25px;
        }

        .info-box h2{
            font-family:'Orbitron',sans-serif;
            margin-bottom:20px;
            color:var(--primary);
        }

        .info-item{
            display:flex;
            align-items:center;
            gap:15px;
            margin-bottom:20px;
            color:var(--text);
        }

        .icon{
            width:45px;
            height:45px;
            display:flex;
            justify-content:center;
            align-items:center;
            border-radius:12px;
            background:rgba(0,229,255,0.1);
            color:var(--primary);
        }

        /* FOOTER */

        footer{
            text-align:center;
            padding:40px;
            margin-top:60px;
            border-top:1px solid var(--border);
            color:#94a3b8;
        }

    </style>
</head>

<body>

    <!-- NAV -->

    <nav>

        <div class="logo">TECHSECURE Ω</div>

        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Servicios</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>

    </nav>

    <!-- HERO -->

    <section class="hero">

        <div>
            <h1>CONTACTO</h1>
            <p>Conéctate con nuestro sistema de soporte avanzado</p>
        </div>

    </section>

    <!-- CONTENIDO -->

    <div class="container">

        <div class="grid">

            <!-- FORMULARIO -->

            <div class="form-box">

                <h2>Enviar Mensaje</h2>

                <form onsubmit="enviar(event)">

                    <input type="text" placeholder="Nombre completo" required>
                    <input type="email" placeholder="Correo electrónico" required>
                    <textarea placeholder="Escribe tu mensaje..." required></textarea>

                    <button type="submit">
                        Enviar Mensaje
                    </button>

                </form>

            </div>

            <!-- INFO -->

            <div class="info-box">

                <h2>Información</h2>

                <div class="info-item">
                    <div class="icon"><i class="fas fa-location-dot"></i></div>
                    <p>San Salvador, El Salvador</p>
                </div>

                <div class="info-item">
                    <div class="icon"><i class="fas fa-envelope"></i></div>
                    <p> isabella.miguel@gmail.com</p>
                </div>

                <div class="info-item">
                    <div class="icon"><i class="fas fa-phone"></i></div>
                    <p>+503 7713 7527 </p>
               </div>

                <div class="info-item">
                    <div class="icon"><i class="fas fa-clock"></i></div>
                    <p>Soporte 24/7 activo</p>
                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <footer>
        © 2026 derechos reservados
    </footer>

    <!-- SCRIPT -->

    <script>

        function enviar(e){
            e.preventDefault();
            alert("🚀 Mensaje enviado al sistema TECHSECURE Ω");
        }

    </script>

</body>

</html>
